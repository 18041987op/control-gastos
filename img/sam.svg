<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F2A0BB"/>
      <stop offset="100%" style="stop-color:#D06B8D"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#fff" stroke-width="3"/>
  <!-- Dog face - white fluffy -->
  <ellipse cx="60" cy="62" rx="32" ry="30" fill="#FEFEFE"/>
  <!-- Fluffy fur tufts -->
  <circle cx="35" cy="45" r="14" fill="#F5F0E8"/>
  <circle cx="85" cy="45" r="14" fill="#F5F0E8"/>
  <circle cx="42" cy="38" r="10" fill="#FEFEFE"/>
  <circle cx="78" cy="38" r="10" fill="#FEFEFE"/>
  <circle cx="60" cy="35" r="12" fill="#F8F3EB"/>
  <circle cx="50" cy="32" r="8" fill="#FEFEFE"/>
  <circle cx="70" cy="32" r="8" fill="#FEFEFE"/>
  <!-- Floppy ears -->
  <ellipse cx="32" cy="52" rx="11" ry="18" fill="#C8B89A" transform="rotate(-15,32,52)"/>
  <ellipse cx="88" cy="52" rx="11" ry="18" fill="#C8B89A" transform="rotate(15,88,52)"/>
  <!-- Face details -->
  <ellipse cx="60" cy="62" rx="28" ry="26" fill="#FEFEFE"/>
  <!-- Eyes -->
  <circle cx="48" cy="56" r="4.5" fill="#2C1810"/>
  <circle cx="72" cy="56" r="4.5" fill="#2C1810"/>
  <circle cx="49.5" cy="54.5" r="1.8" fill="#fff"/>
  <circle cx="73.5" cy="54.5" r="1.8" fill="#fff"/>
  <!-- Nose -->
  <ellipse cx="60" cy="66" rx="5" ry="3.5" fill="#2C1810"/>
  <ellipse cx="60" cy="65" rx="2.5" ry="1.2" fill="#5A4030" opacity=".4"/>
  <!-- Mouth -->
  <path d="M55,70 Q60,76 65,70" fill="none" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tongue -->
  <ellipse cx="60" cy="76" rx="5" ry="6" fill="#F2A0BB"/>
  <ellipse cx="60" cy="74" rx="4" ry="3" fill="#E8899E"/>
  <!-- Paw prints at bottom -->
  <text x="60" y="108" text-anchor="middle" font-size="14" opacity=".8">🐾</text>
</svg>